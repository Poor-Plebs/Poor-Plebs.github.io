<style>
/* Logo visibility in dark mode — both manual toggle and system preference */
html[data-mode="dark"] #avatar img,
html:not([data-mode]) #avatar img {
  border-radius: 50%;
  box-shadow: 0 0 0 8px #ffffff, 0 0 12px rgba(255, 255, 255, 0.3);
}

@media (prefers-color-scheme: light) {
  html:not([data-mode]) #avatar img {
    border-radius: 0;
    box-shadow: none;
  }
}
</style>
