<style>
/* Logo visibility in dark mode — both manual toggle and system preference */
html[data-mode="dark"] #avatar img,
html:not([data-mode]) #avatar img {
  background-color: #ffffff;
  border-radius: 50%;
  padding: 8px;
  box-sizing: border-box;
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
}

@media (prefers-color-scheme: light) {
  html:not([data-mode]) #avatar img {
    background-color: transparent;
    padding: 0;
    box-shadow: none;
  }
}
</style>
